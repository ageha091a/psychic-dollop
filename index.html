<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Discord スレッドspamer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-content">
    <h2>agehanto slled spamer</h2>
    
    <div class="field">
        <label>ユーザートークン (1行に1つ入力):</label>
        <textarea id="tokens" placeholder="トークン1&#10;トークン2&#10;トークン3" style="height: 80px;"></textarea>
    </div>
    
    <div class="field">
        <label>チャンネルID:</label>
        <input type="text" id="channelId" placeholder="例: 123456789012345678">
    </div>

    <div class="field">
        <label>スレッド名:</label>
        <input type="text" id="threadName" placeholder="作成するスレッドの名前">
    </div>

    <div class="field">
        <label>送信するメッセージ:</label>
        <textarea id="message" placeholder="スレッド内に投稿する内容"></textarea>
    </div>

    <div class="field">
        <label>作成する数 (合計):</label>
        <input type="number" id="count" value="1" min="1">
    </div>

    <div class="field">
        <label>作成間隔 (秒):</label>
        <input type="number" id="delay" value="0.5" step="0.1" min="0.5">
    </div>

    <div class="actions">
        <button id="startBtn" style="flex: 1; padding: 10px;">実行開始</button>
    </div>

    <div class="field" style="margin-top: 20px;">
        <div id="log">ログがここに表示されます...</div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
